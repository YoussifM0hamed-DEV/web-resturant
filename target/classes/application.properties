# ==============================
# Database (H2 In-Memory)
# ==============================
spring.datasource.url=jdbc:h2:mem:restaurantdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console — open http://localhost:8080/h2-console while app is running
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# App
# ==============================
server.port=8080
spring.application.name=restaurant-ordering
spring.thymeleaf.cache=false
server.servlet.session.timeout=24h

# n8n webhook configuration for order notifications
n8n.webhook.url=https://syphietradigmailcom.app.n8n.cloud/webhook-test/order-notification

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – Saveur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-wrapper { width: 100%; max-width: 440px; padding: 1rem; }
    .brand-title { font-family: 'Playfair Display', serif; color: #e8b86d; font-size: 2rem; text-decoration: none; }
    .card { border: none; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); background: #1a1a1a; }
    .card-body { padding: 2.5rem; }
    .card-title { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.8rem; }
    .card-subtitle { color: #888; }
    .form-label { color: #ccc; font-size: 0.85rem; font-weight: 500; }
    .form-control { background: #2a2a2a; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 0.7rem 1rem; }
    .form-control:focus { background: #2a2a2a; border-color: #e8b86d; color: #fff; box-shadow: 0 0 0 3px rgba(232,184,109,0.15); }
    .form-control::placeholder { color: #555; }
    .input-group-text { background: #2a2a2a; border: 1px solid #333; color: #888; border-radius: 10px 0 0 10px; }
    .btn-primary { background: linear-gradient(135deg, #e8b86d, #c9942e); border: none; border-radius: 10px; padding: 0.75rem; font-weight: 600; font-size: 1rem; transition: all 0.3s; color: #000; }
    .btn-primary:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,184,109,0.3); color: #000; }
    .divider { border-color: #333; }
    .footer-link { color: #888; font-size: 0.9rem; }
    .footer-link a { color: #e8b86d; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { color: #f0c97e; }
    .alert-danger { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.3); color: #ff6b6b; border-radius: 10px; }
    .alert-success { background: rgba(25,135,84,0.15); border: 1px solid rgba(25,135,84,0.3); color: #75d49b; border-radius: 10px; }
    .demo-box { background: rgba(232,184,109,0.07); border: 1px solid rgba(232,184,109,0.2); border-radius: 12px; padding: 1rem; }
    .demo-box p { color: #888; font-size: 0.8rem; margin-bottom: 0.4rem; }
    .demo-box code { color: #e8b86d; font-size: 0.82rem; }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="text-center mb-4">
    <a href="/menu" class="brand-title">🍽 Saveur</a>
    <p class="text-muted mt-1" style="font-size:0.85rem;">Fine Dining Experience</p>
  </div>

  <div class="card">
    <div class="card-body">
      <h2 class="card-title mb-1">Welcome Back</h2>
      <p class="card-subtitle mb-4">Sign in to your account to continue</p>

      <!-- Login error (Spring Security appends ?error) -->
      <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span>Invalid email or password. Please try again.</span>
      </div>

      <!-- Logout success -->
      <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i>
        <span>You have been logged out successfully.</span>
      </div>

      <!-- Flash success from register redirect -->
      <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="username" class="form-control" placeholder="you@example.com" required style="border-radius:0 10px 10px 0;"/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required style="border-radius:0 10px 10px 0;"/>
          </div>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me" value="true" />
          <label class="form-check-label text-white" for="rememberMe">Keep me signed in for 24 hours</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <hr class="divider"/>
      <p class="footer-link text-center mb-3">
        Don't have an account? <a th:href="@{/register}">Create one</a>
      </p>

      <div class="demo-box">
        <p><i class="bi bi-info-circle me-1"></i>Admin demo credentials:</p>
        <p class="mb-1">Email: <code>admin@restaurant.com</code></p>
        <p class="mb-0">Password: <code>admin123</code></p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

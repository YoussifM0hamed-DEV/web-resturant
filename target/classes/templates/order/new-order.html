<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Place Order – Saveur</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 <style>
 body { font-family: 'DM Sans', sans-serif; background: #f8f5f0; }
 .navbar { background: #1a1a1a !important; padding: 1rem 2rem; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
 .navbar-brand { font-family: 'Playfair Display', serif; color: #e8b86d !important; font-size: 1.6rem; font-weight: 700; }
 .nav-link { color: #ccc !important; font-weight: 500; }
 .nav-link:hover { color: #e8b86d !important; }
 .btn-gold { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 8px; font-weight: 600; padding: 0.45rem 1.1rem; }
 .btn-gold:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); color: #000; }
 .btn-outline-gold { border: 1px solid #e8b86d; color: #e8b86d; border-radius: 8px; font-weight: 500; background: transparent; }
 .btn-outline-gold:hover { background: #e8b86d; color: #000; }
 .page-header { background: linear-gradient(135deg, #1a1a1a, #2d1f00); color: white; padding: 2.5rem; margin-bottom: 2rem; border-radius: 0 0 20px 20px; }
 .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #e8b86d; }
 .panel { background: white; border-radius: 16px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); padding: 1.5rem; }
 .panel-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #1a1a1a; margin-bottom: 1.25rem; border-bottom: 2px solid #e8b86d; padding-bottom: 0.5rem; }
 .category-pill { border: 1px solid #dee2e6; background: white; color: #555; border-radius: 50px; padding: 0.35rem 1rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
 .category-pill:hover, .category-pill.active { background: #1a1a1a; color: #e8b86d; border-color: #1a1a1a; }
 .section-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin: 1.25rem 0 0.75rem; }
 .item-row { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; border-radius: 12px; border: 1px solid #f0ebe3; margin-bottom: 0.5rem; transition: all 0.2s; background: #fdfaf6; }
 .item-row:hover { border-color: #e8b86d; background: #fffdf9; }
 .item-row.has-qty { border-color: #e8b86d; background: #fffbf2; box-shadow: 0 0 0 2px rgba(232,184,109,0.2); }
 .item-name { font-weight: 600; font-size: 0.92rem; color: #1a1a1a; }
 .item-desc { font-size: 0.78rem; color: #888; }
 .item-price { font-weight: 700; color: #c9942e; font-size: 0.9rem; white-space: nowrap; }
 .qty-wrap { display: flex; align-items: center; gap: 0.4rem; }
 .qty-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; padding: 0; }
 .qty-btn:hover { background: #1a1a1a; color: #e8b86d; border-color: #1a1a1a; }
 .qty-input { width: 38px; text-align: center; border: 1px solid #ddd; border-radius: 8px; padding: 0.25rem; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }
 .cart-panel { position: sticky; top: 80px; }
 .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid #f5f0e8; font-size: 0.88rem; }
 .cart-item-name { color: #333; }
 .cart-item-price { font-weight: 600; color: #c9942e; }
 .cart-empty-state { text-align: center; padding: 2rem 1rem; color: #aaa; }
 .cart-empty-state i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
 .cart-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; padding: 1rem 0 0; color: #1a1a1a; }
 .cart-total span:last-child { color: #c9942e; }
 .btn-place { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; padding: 0.85rem; transition: all 0.3s; width: 100%; }
 .btn-place:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,184,109,0.4); color: #000; }
 .btn-place:disabled { opacity: 0.5; cursor: not-allowed; background: #ccc; }
 .notes-field { border: 1px solid #e0d8cc; border-radius: 10px; background: #fdfaf6; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; resize: none; }
 .notes-field:focus { border-color: #e8b86d; box-shadow: 0 0 0 3px rgba(232,184,109,0.15); outline: none; }
 </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
 <div class="container">
 <a class="navbar-brand" href="/menu">🍽 Saveur</a>
 <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
 <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
 </button>
 <div class="collapse navbar-collapse" id="nav">
 <ul class="navbar-nav me-auto ms-3">
 <li class="nav-item"><a class="nav-link" href="/menu"><i class="bi bi-grid me-1"></i>Menu</a></li>
 <li class="nav-item"><a class="nav-link" href="/orders/my"><i class="bi bi-receipt me-1"></i>My Orders</a></li>
 <li class="nav-item" sec:authorize="hasRole('ADMIN')">
   <a class="nav-link" href="/admin"><i class="bi bi-shield-lock me-1"></i>Admin</a>
 </li>
 </ul>
 <form th:action="@{/logout}" method="post">
 <button type="submit" class="btn btn-outline-gold btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
 </form>
 </div>
 </div>
</nav>

<div class="page-header">
 <div class="container">
 <h1><i class="bi bi-bag-plus me-2"></i>Build Your Order</h1>
 <p class="mb-0" style="color:#aaa;font-size:0.9rem;">Select your items and quantities, then place your order</p>
 </div>
</div>

<div class="container pb-5">
 <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-3">
 <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}">Error</span>
 </div>

 <div class="row g-4">
 <!-- Menu Panel -->
 <div class="col-lg-8">
 <div class="panel">
 <h3 class="panel-title"><i class="bi bi-grid me-2"></i>Menu</h3>

 <!-- Category pills -->
 <div class="d-flex flex-wrap gap-2 mb-3">
 <button class="category-pill active" data-category="all">All</button>
 <button class="category-pill" th:each="entry : ${menuByCategory}"
         th:text="${entry.key}"
         th:attr="data-category=${entry.key}">Cat</button>
 </div>

 <form id="orderForm" th:action="@{/orders/place}" method="post">
 <div th:each="entry : ${menuByCategory}" class="menu-section" th:attr="data-section=${entry.key}">
 <p class="section-label" th:text="${entry.key}">Category</p>
 <div th:each="item : ${entry.value}"
   class="item-row"
   th:attr="data-category=${entry.key},data-name=${item.name},data-price=${item.price}">
 <div class="flex-grow-1 me-3">
 <div class="item-name" th:text="${item.name}">Name</div>
 <div class="item-desc" th:text="${item.description}">Desc</div>
 </div>
 <div class="d-flex align-items-center gap-3">
 <span class="item-price" th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)}">$0</span>
 <div class="qty-wrap">
 <button type="button" class="qty-btn minus">−</button>
 <input type="number" th:name="'item_' + ${item.id}"
   class="qty-input" value="0" min="0" max="20" readonly/>
 <button type="button" class="qty-btn plus">+</button>
 </div>
 </div>
 </div>
 </div>
 </form>
 </div>
 </div>

 <!-- Cart Panel -->
 <div class="col-lg-4">
 <div class="panel cart-panel">
 <h3 class="panel-title"><i class="bi bi-bag me-2"></i>Your Cart</h3>

 <div id="cartItems">
 <div class="cart-empty-state">
 <i class="bi bi-bag"></i>
 <p class="mb-0" style="font-size:0.9rem;">Your cart is empty.<br/>Add items from the menu!</p>
 </div>
 </div>

 <div id="cartSummary" style="display:none;">
 <div class="cart-total">
 <span>Total</span>
 <span id="cartTotal">$0.00</span>
 </div>
 <hr style="border-color:#f0ebe3;"/>
 <div class="mb-3">
 <label class="form-label" style="font-size:0.85rem;font-weight:600;color:#555;">Special Notes</label>
 <textarea form="orderForm" name="notes" rows="2"
   class="form-control notes-field"
   placeholder="Allergies, preferences, special requests..."></textarea>
 </div>
 <button type="submit" form="orderForm" class="btn btn-place" id="placeOrderBtn">
 <i class="bi bi-check-circle me-2"></i>Place Order
 </button>
 </div>

 <div id="emptyCartBtn">
 <button type="button" class="btn btn-place mt-2" disabled>
 <i class="bi bi-bag me-2"></i>Add Items to Order
 </button>
 </div>
 </div>
 </div>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const cart = {};

function updateCart() {
 const cartItemsEl = document.getElementById('cartItems');
 const cartSummary = document.getElementById('cartSummary');
 const emptyBtn = document.getElementById('emptyCartBtn');
 const keys = Object.keys(cart).filter(k => cart[k].qty > 0);

 if (keys.length === 0) {
   cartItemsEl.innerHTML = '<div class="cart-empty-state"><i class="bi bi-bag"></i><p class="mb-0" style="font-size:0.9rem;">Your cart is empty.<br/>Add items from the menu!</p></div>';
   cartSummary.style.display = 'none';
   emptyBtn.style.display = 'block';
   return;
 }

 let html = '';
 let total = 0;
 keys.forEach(k => {
   const {name, price, qty} = cart[k];
   const sub = price * qty;
   total += sub;
   html += `<div class="cart-item-row"><span class="cart-item-name">${qty}x ${name}</span><span class="cart-item-price">$${sub.toFixed(2)}</span></div>`;
 });
 cartItemsEl.innerHTML = html;
 document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
 cartSummary.style.display = 'block';
 emptyBtn.style.display = 'none';
}

document.querySelectorAll('.qty-btn').forEach(btn => {
 btn.addEventListener('click', function() {
   const row = this.closest('.item-row');
   const input = row.querySelector('.qty-input');
   const name = row.dataset.name;
   const price = parseFloat(row.dataset.price);
   const inputName = input.name;
   let val = parseInt(input.value) || 0;

   if (this.classList.contains('plus')) val = Math.min(val + 1, 20);
   else val = Math.max(val - 1, 0);

   input.value = val;
   row.classList.toggle('has-qty', val > 0);

   if (val > 0) cart[inputName] = {name, price, qty: val};
   else delete cart[inputName];

   updateCart();
 });
});

// Category filter
document.querySelectorAll('.category-pill').forEach(pill => {
 pill.addEventListener('click', function() {
   document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
   this.classList.add('active');
   const cat = this.dataset.category;
   document.querySelectorAll('.menu-section').forEach(sec => {
     sec.style.display = (cat === 'all' || sec.dataset.section === cat) ? 'block' : 'none';
   });
 });
});
</script>
</body>
</html>

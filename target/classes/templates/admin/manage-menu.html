<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Manage Menu – Saveur Admin</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 <style>
 body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; }
 .sidebar { width: 250px; min-height: 100vh; background: #1a1a1a; position: fixed; top: 0; left: 0; z-index: 100; }
 .sidebar-brand { font-family: 'Playfair Display', serif; color: #e8b86d; font-size: 1.4rem; padding: 1.5rem; border-bottom: 1px solid #2d2d2d; display: block; text-decoration: none; }
 .sidebar-brand span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 0.2rem; }
 .sidebar-nav { padding: 1rem 0; }
 .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
 .sidebar-link:hover, .sidebar-link.active { color: #e8b86d; background: rgba(232,184,109,0.08); border-left-color: #e8b86d; }
 .sidebar-link i { font-size: 1.1rem; width: 20px; }
 .sidebar-section { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #444; padding: 1rem 1.5rem 0.4rem; }
 .main-content { margin-left: 250px; padding: 2rem; }
 .topbar { background: white; border-radius: 16px; padding: 1.25rem 1.75rem; margin-bottom: 1.5rem; box-shadow: 0 1px 10px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
 .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #1a1a1a; margin: 0; }
 .btn-gold { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 8px; font-weight: 600; }
 .btn-gold:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); color: #000; }
 .card { border: none; border-radius: 16px; box-shadow: 0 1px 10px rgba(0,0,0,0.06); }
 .card-header { background: white; border-bottom: 1px solid #f5f0e8; padding: 1.25rem 1.5rem; border-radius: 16px 16px 0 0 !important; }
 .table thead th { background: #fdfaf6; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; font-weight: 700; border-bottom: 1px solid #f0ebe3; padding: 0.8rem 1rem; }
 .table tbody td { padding: 0.9rem 1rem; vertical-align: middle; font-size: 0.88rem; border-color: #f8f3eb; }
 .badge-available { background: rgba(25,135,84,0.1); color: #198754; border: 1px solid rgba(25,135,84,0.25); border-radius: 20px; padding: 0.3rem 0.7rem; font-size: 0.75rem; font-weight: 600; }
 .badge-unavailable { background: rgba(220,53,69,0.1); color: #dc3545; border: 1px solid rgba(220,53,69,0.25); border-radius: 20px; padding: 0.3rem 0.7rem; font-size: 0.75rem; font-weight: 600; }
 .btn-logout { background: transparent; border: 1px solid #333; color: #888; border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.85rem; }
 .btn-logout:hover { border-color: #e8b86d; color: #e8b86d; }
 .price-cell { font-weight: 700; color: #c9942e; }
 </style>
</head>
<body>
<div class="sidebar">
 <a href="/admin" class="sidebar-brand">🍽 Saveur<span>Admin Panel</span></a>
 <div class="sidebar-nav">
 <div class="sidebar-section">Main</div>
 <a href="/admin" class="sidebar-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
 <a href="/admin/orders" class="sidebar-link"><i class="bi bi-receipt"></i>Orders</a>
 <div class="sidebar-section">Manage</div>
 <a href="/admin/menu" class="sidebar-link active"><i class="bi bi-grid"></i>Menu Items</a>
 <div class="sidebar-section">Site</div>
 <a href="/menu" class="sidebar-link"><i class="bi bi-eye"></i>View Website</a>
 </div>
</div>

<div class="main-content">
 <div class="topbar">
 <h1 class="topbar-title"><i class="bi bi-grid me-2" style="color:#e8b86d;"></i>Menu Items</h1>
 <div class="d-flex gap-2">
 <a href="/admin/menu/new" class="btn btn-gold"><i class="bi bi-plus-lg me-1"></i>Add Item</a>
 <form action="#" method="post">
 <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
 </form>
 </div>
 </div>

 <div class="alert alert-success border-0 rounded-3 mb-3"><i class="bi bi-check-circle me-2"></i><span ></span></div>

 <div class="card">
 <div class="card-header d-flex justify-content-between align-items-center">
 <span style="font-family:'Playfair Display',serif;font-size:1.05rem;"><i class="bi bi-list-ul me-2" style="color:#e8b86d;"></i>All Menu Items</span>
 <span class="badge" style="background:#f0ebe3;color:#777;border-radius:20px;padding:0.4rem 0.8rem;" ></span>
 </div>
 <div class="table-responsive">
 <table class="table">
 <thead>
 <tr>
 <th>#</th>
 <th>Name</th>
 <th>Category</th>
 <th>Price</th>
 <th>Status</th>
 <th>Actions</th>
 </tr>
 </thead>
 <tbody>
 <tr>
 <td style="color:#aaa;" >1</td>
 <td>
 <div class="fw-600" >Name</div>
 <div style="font-size:0.75rem;color:#aaa;" >Desc</div>
 </td>
 <td>
 <span style="background:#f0ebe3;color:#666;border-radius:20px;padding:0.25rem 0.7rem;font-size:0.78rem;font-weight:600;" >Cat</span>
 </td>
 <td class="price-cell" >$0</td>
 <td>
 <span
 ></span>
 </td>
 <td>
 <div class="d-flex gap-1 flex-wrap">
 <a href="#" class="btn btn-sm btn-outline-secondary rounded-3" style="font-size:0.8rem;">
 <i class="bi bi-pencil me-1"></i>Edit
 </a>
 <form action="#" method="post" class="d-inline">
 <button type="submit" class="btn btn-sm rounded-3"
 
 style="font-size:0.8rem;"
 >Toggle</button>
 </form>
 <form action="#" method="post" class="d-inline">
 <button type="submit" class="btn btn-sm btn-outline-danger rounded-3" style="font-size:0.8rem;"
 onclick="return confirm('Delete this item permanently?')">
 <i class="bi bi-trash"></i>
 </button>
 </form>
 </div>
 </td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

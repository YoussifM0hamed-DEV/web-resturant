<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Menu Item Form – Saveur Admin</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 <style>
 body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; }
 .sidebar { width: 250px; min-height: 100vh; background: #1a1a1a; position: fixed; top: 0; left: 0; z-index: 100; }
 .sidebar-brand { font-family: 'Playfair Display', serif; color: #e8b86d; font-size: 1.4rem; padding: 1.5rem; border-bottom: 1px solid #2d2d2d; display: block; text-decoration: none; }
 .sidebar-brand span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 0.2rem; }
 .sidebar-nav { padding: 1rem 0; }
 .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
 .sidebar-link:hover, .sidebar-link.active { color: #e8b86d; background: rgba(232,184,109,0.08); border-left-color: #e8b86d; }
 .sidebar-link i { font-size: 1.1rem; width: 20px; }
 .sidebar-section { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #444; padding: 1rem 1.5rem 0.4rem; }
 .main-content { margin-left: 250px; padding: 2rem; }
 .topbar { background: white; border-radius: 16px; padding: 1.25rem 1.75rem; margin-bottom: 1.5rem; box-shadow: 0 1px 10px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
 .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #1a1a1a; margin: 0; }
 .form-card { background: white; border-radius: 16px; box-shadow: 0 1px 10px rgba(0,0,0,0.06); padding: 2rem; max-width: 680px; }
 .form-label { font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 0.4rem; }
 .form-control, .form-select { border: 1px solid #e8e0d4; border-radius: 10px; padding: 0.65rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; background: #fdfaf6; }
 .form-control:focus, .form-select:focus { border-color: #e8b86d; box-shadow: 0 0 0 3px rgba(232,184,109,0.15); background: white; }
 .btn-gold { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 10px; font-weight: 600; padding: 0.7rem 2rem; }
 .btn-gold:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); color: #000; }
 .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: #888; text-decoration: none; font-size: 0.9rem; margin-bottom: 1.25rem; transition: color 0.2s; }
 .back-link:hover { color: #c9942e; }
 .btn-logout { background: transparent; border: 1px solid #333; color: #888; border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.85rem; }
 .btn-logout:hover { border-color: #e8b86d; color: #e8b86d; }
 .form-check-input:checked { background-color: #c9942e; border-color: #c9942e; }
 </style>
</head>
<body>
<div class="sidebar">
 <a href="/admin" class="sidebar-brand">🍽 Saveur<span>Admin Panel</span></a>
 <div class="sidebar-nav">
 <div class="sidebar-section">Main</div>
 <a href="/admin" class="sidebar-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
 <a href="/admin/orders" class="sidebar-link"><i class="bi bi-receipt"></i>Orders</a>
 <div class="sidebar-section">Manage</div>
 <a href="/admin/menu" class="sidebar-link active"><i class="bi bi-grid"></i>Menu Items</a>
 <div class="sidebar-section">Site</div>
 <a href="/menu" class="sidebar-link"><i class="bi bi-eye"></i>View Website</a>
 </div>
</div>

<div class="main-content">
 <div class="topbar">
 <h1 class="topbar-title" th:text="${item.id != null} ? 'Edit Item' : 'New Item'">Form</h1>
 <form th:action="@{/logout}" method="post">
 <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
 </form>
 </div>

 <a href="/admin/menu" class="back-link"><i class="bi bi-arrow-left"></i>Back to Menu Items</a>

 <div class="form-card">
 <form th:action="@{/admin/menu/save}" method="post" th:object="${item}">
 <input type="hidden" th:field="*{id}"/>

 <div class="mb-3">
 <label class="form-label">Item Name <span class="text-danger">*</span></label>
 <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Grilled Salmon" required/>
 </div>

 <div class="mb-3">
 <label class="form-label">Description</label>
 <textarea th:field="*{description}" class="form-control" rows="2"
   placeholder="Brief mouth-watering description..."></textarea>
 </div>

 <div class="row g-3 mb-3">
 <div class="col-md-6">
 <label class="form-label">Price (USD) <span class="text-danger">*</span></label>
 <div class="input-group">
 <span class="input-group-text" style="background:#f0ebe3;border-color:#e8e0d4;border-radius:10px 0 0 10px;">$</span>
 <input type="number" th:field="*{price}" class="form-control" step="0.01" min="0"
   placeholder="0.00" required style="border-radius:0 10px 10px 0;"/>
 </div>
 </div>
 <div class="col-md-6">
 <label class="form-label">Category <span class="text-danger">*</span></label>
 <select th:field="*{category}" class="form-select" required>
 <option value="">-- Select Category --</option>
 <option value="Starters">🥗 Starters</option>
 <option value="Main Course">🍽 Main Course</option>
 <option value="Desserts">🍰 Desserts</option>
 <option value="Drinks">🥤 Drinks</option>
 </select>
 </div>
 </div>

 <div class="mb-4">
 <div class="form-check form-switch">
 <input th:field="*{available}" class="form-check-input" type="checkbox" role="switch" style="width:2.5em;height:1.3em;"/>
 <label class="form-check-label ms-2" style="font-size:0.9rem;font-weight:500;color:#444;">
 Available on menu (customers can order this item)
 </label>
 </div>
 </div>

 <div class="d-flex gap-2">
 <button type="submit" class="btn btn-gold">
 <i class="bi bi-check-lg me-2"></i>Save Item
 </button>
 <a href="/admin/menu" class="btn btn-outline-secondary rounded-3">Cancel</a>
 </div>
 </form>
 </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

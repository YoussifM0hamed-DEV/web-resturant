<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>My Orders – Saveur</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 <style>
 body { font-family: 'DM Sans', sans-serif; background: #f8f5f0; }
 .navbar { background: #1a1a1a !important; padding: 1rem 2rem; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
 .navbar-brand { font-family: 'Playfair Display', serif; color: #e8b86d !important; font-size: 1.6rem; }
 .nav-link { color: #ccc !important; font-weight: 500; }
 .nav-link:hover { color: #e8b86d !important; }
 .btn-gold { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 8px; font-weight: 600; }
 .btn-gold:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); color: #000; }
 .btn-outline-gold { border: 1px solid #e8b86d; color: #e8b86d; border-radius: 8px; background: transparent; font-weight: 500; }
 .btn-outline-gold:hover { background: #e8b86d; color: #000; }
 .page-header { background: linear-gradient(135deg, #1a1a1a, #2d1f00); color: white; padding: 2.5rem; margin-bottom: 2rem; border-radius: 0 0 20px 20px; }
 .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #e8b86d; }
 .order-card { background: white; border-radius: 16px; box-shadow: 0 2px 15px rgba(0,0,0,0.07); border: 1px solid #f0ebe3; overflow: hidden; margin-bottom: 1.25rem; transition: box-shadow 0.2s; }
 .order-card:hover { box-shadow: 0 6px 25px rgba(0,0,0,0.12); }
 .order-card-header { background: #fdfaf6; border-bottom: 1px solid #f0ebe3; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
 .order-id { font-weight: 700; font-size: 1rem; color: #1a1a1a; }
 .order-body { padding: 1.25rem 1.5rem; }
 .order-date { font-size: 0.82rem; color: #999; margin-bottom: 0.75rem; }
 .order-item-line { display: flex; justify-content: space-between; font-size: 0.88rem; color: #555; padding: 0.25rem 0; border-bottom: 1px dashed #f5f0e8; }
 .order-item-line:last-child { border-bottom: none; }
 .order-total-row { display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem; margin-top: 0.75rem; }
 .total-label { font-size: 0.9rem; color: #777; }
 .total-amount { font-weight: 700; font-size: 1.1rem; color: #c9942e; }
 .order-footer { padding: 0.75rem 1.5rem; background: #fdfaf6; border-top: 1px solid #f0ebe3; display: flex; gap: 0.5rem; flex-wrap: wrap; }
 .status-pending { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
 .status-confirmed { background: #cff4fc; color: #055160; border: 1px solid #0dcaf0; }
 .status-preparing { background: #e2d9f3; color: #5b21b6; border: 1px solid #9b72cf; }
 .status-ready { background: #d1fae5; color: #065f46; border: 1px solid #34d399; }
 .status-delivered { background: #e9ecef; color: #495057; border: 1px solid #adb5bd; }
 .status-cancelled { background: #fde8e8; color: #b91c1c; border: 1px solid #f87171; }
 .status-badge { border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
 .empty-state { text-align: center; padding: 5rem 2rem; background: white; border-radius: 16px; box-shadow: 0 2px 15px rgba(0,0,0,0.07); }
 .empty-state i { font-size: 4rem; color: #e8b86d; display: block; margin-bottom: 1rem; }
 .empty-state h4 { font-family: 'Playfair Display', serif; color: #1a1a1a; }
 </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
 <div class="container">
 <a class="navbar-brand" href="/menu">🍽 Saveur</a>
 <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-label="Toggle navigation">
 <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
 </button>
 <div class="collapse navbar-collapse" id="nav">
 <ul class="navbar-nav me-auto ms-3">
 <li class="nav-item"><a class="nav-link" href="/menu"><i class="bi bi-grid me-1"></i>Menu</a></li>
 <li class="nav-item"><a class="nav-link active" href="/orders/my"><i class="bi bi-receipt me-1"></i>My Orders</a></li>
 <li class="nav-item" sec:authorize="hasRole('ADMIN')">
   <a class="nav-link" href="/admin"><i class="bi bi-shield-lock me-1"></i>Admin</a>
 </li>
 </ul>
 <div class="d-flex gap-2">
 <a href="/orders/new" class="btn btn-gold btn-sm"><i class="bi bi-plus me-1"></i>New Order</a>
 <form th:action="@{/logout}" method="post">
 <button type="submit" class="btn btn-outline-gold btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
 </form>
 </div>
 </div>
 </div>
</nav>

<div class="page-header">
 <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
 <div>
 <h1><i class="bi bi-receipt me-2"></i>My Orders</h1>
 <p class="mb-0" style="color:#aaa;font-size:0.9rem;">Track and manage your order history</p>
 </div>
 <a href="/orders/new" class="btn btn-gold">
 <i class="bi bi-plus-circle me-2"></i>New Order
 </a>
 </div>
</div>

<div class="container pb-5">
 <div th:if="${success}" class="alert alert-success border-0 rounded-3 mb-3 d-flex align-items-center gap-2">
 <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
 </div>
 <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-3 d-flex align-items-center gap-2">
 <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
 </div>

 <!-- Empty state -->
 <div th:if="${orders.isEmpty()}" class="empty-state">
 <i class="bi bi-bag"></i>
 <h4>No orders yet</h4>
 <p class="text-muted mb-4">You haven't placed any orders. Explore our menu and place your first order!</p>
 <a href="/orders/new" class="btn btn-gold px-4">
 <i class="bi bi-bag-plus me-2"></i>Order Now
 </a>
 </div>

 <!-- Orders list -->
 <div th:if="${!orders.isEmpty()}">
 <div class="order-card" th:each="order : ${orders}">
 <div class="order-card-header">
 <div class="d-flex align-items-center gap-3">
 <span class="order-id"><i class="bi bi-hash"></i><span th:text="${order.id}"></span></span>
 <span th:class="'status-badge status-' + ${order.status.name().toLowerCase()}"
       th:text="${order.status}">Status</span>
 </div>
 <span class="order-date"><i class="bi bi-clock me-1"></i>
 <span th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
 </span>
 </div>
 <div class="order-body">
 <div class="order-item-line" th:each="item : ${order.items}">
 <span><i class="bi bi-dot me-1"></i>
 <span th:text="${item.quantity}">1</span>x
 <span th:text="${item.menuItem.name}">Item</span>
 </span>
 <span th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0</span>
 </div>
 <div class="order-total-row">
 <span class="total-label">Order Total:</span>
 <span class="total-amount" th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}">$0.00</span>
 </div>
 </div>
 <div class="order-footer">
 <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-gold">
 <i class="bi bi-eye me-1"></i>View Details
 </a>
 <form th:if="${order.status.name() == 'PENDING'}"
   th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post" class="d-inline">
 <button type="submit" class="btn btn-sm btn-outline-danger rounded-3"
   onclick="return confirm('Are you sure you want to cancel this order?')">
 <i class="bi bi-x-circle me-1"></i>Cancel
 </button>
 </form>
 </div>
 </div>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

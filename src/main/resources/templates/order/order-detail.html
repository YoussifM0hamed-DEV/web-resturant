<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title >Order Detail</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 <style>
 body { font-family: 'DM Sans', sans-serif; background: #f8f5f0; }
 .navbar { background: #1a1a1a !important; padding: 1rem 2rem; }
 .navbar-brand { font-family: 'Playfair Display', serif; color: #e8b86d !important; font-size: 1.6rem; }
 .nav-link { color: #ccc !important; font-weight: 500; }
 .nav-link:hover { color: #e8b86d !important; }
 .btn-gold { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 8px; font-weight: 600; }
 .btn-gold:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); color: #000; }
 .btn-outline-gold { border: 1px solid #e8b86d; color: #e8b86d; border-radius: 8px; background: transparent; font-weight: 500; }
 .btn-outline-gold:hover { background: #e8b86d; color: #000; }
 .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: #888; text-decoration: none; font-size: 0.9rem; margin-bottom: 1.5rem; transition: color 0.2s; }
 .back-link:hover { color: #c9942e; }
 .detail-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
 .detail-card-header { background: linear-gradient(135deg, #1a1a1a, #2d1f00); padding: 2rem 2rem 1.5rem; color: white; }
 .order-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #e8b86d; }
 .detail-card-body { padding: 2rem; }
 .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; background: #fdfaf6; border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem; border: 1px solid #f0ebe3; }
 .info-item label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 0.25rem; }
 .info-item span { font-size: 0.92rem; font-weight: 500; color: #1a1a1a; }
 .table { margin-bottom: 0; }
 .table thead th { background: #fdfaf6; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; font-weight: 700; border-bottom: 2px solid #f0ebe3; padding: 0.85rem 1rem; }
 .table tbody td { padding: 0.9rem 1rem; vertical-align: middle; border-color: #f8f3eb; font-size: 0.9rem; }
 .table tfoot td { font-weight: 700; font-size: 1rem; border-top: 2px solid #f0ebe3; background: #fdfaf6; padding: 1rem; }
 .total-amount { color: #c9942e; font-size: 1.2rem; }
 .status-pending { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
 .status-confirmed { background: #cff4fc; color: #055160; border: 1px solid #0dcaf0; }
 .status-preparing { background: #e2d9f3; color: #5b21b6; border: 1px solid #9b72cf; }
 .status-ready { background: #d1fae5; color: #065f46; border: 1px solid #34d399; }
 .status-delivered { background: #e9ecef; color: #495057; border: 1px solid #adb5bd; }
 .status-cancelled { background: #fde8e8; color: #b91c1c; border: 1px solid #f87171; }
 .status-badge { border-radius: 20px; padding: 0.35rem 1rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
 </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
 <div class="container">
 <a class="navbar-brand" href="/menu">🍽 Saveur</a>
 <div class="collapse navbar-collapse">
 <ul class="navbar-nav me-auto ms-3">
 <li class="nav-item"><a class="nav-link" href="/menu">Menu</a></li>
 <li class="nav-item"><a class="nav-link" href="#">My Orders</a></li>
 </li>
 </ul>
 <form action="#" method="post">
 <button type="submit" class="btn btn-outline-gold btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
 </form>
 </div>
 </div>
</nav>

<div class="container py-4">
 <a href="#" class="back-link"><i class="bi bi-arrow-left"></i>Back to My Orders</a>

 <div class="detail-card">
 <div class="detail-card-header">
 <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
 <div>
 <p style="color:#aaa;font-size:0.82rem;margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:2px;">Order Receipt</p>
 <div class="order-num">Order #<span ></span></div>
 </div>
 <span
 >Status</span>
 </div>
 </div>

 <div class="detail-card-body">
 <!-- Info Grid -->
 <div class="info-grid">
 <div class="info-item">
 <label><i class="bi bi-calendar3 me-1"></i>Date Placed</label>
 <span >Date</span>
 </div>
 <div class="info-item">
 <label><i class="bi bi-clock me-1"></i>Time</label>
 <span >Time</span>
 </div>
 <div class="info-item">
 <label><i class="bi bi-person me-1"></i>Customer</label>
 <span >Name</span>
 </div>
 <div class="info-item">
 <label><i class="bi bi-chat me-1"></i>Notes</label>
 <span >Notes</span>
 </div>
 </div>

 <!-- Items Table -->
 <div class="table-responsive rounded-3 border" style="border-color:#f0ebe3 !important;">
 <table class="table mb-0">
 <thead>
 <tr>
 <th>Item</th>
 <th class="text-center">Qty</th>
 <th class="text-end">Unit Price</th>
 <th class="text-end">Subtotal</th>
 </tr>
 </thead>
 <tbody>
 <tr>
 <td>
 <div class="fw-600" >Name</div>
 <div style="font-size:0.78rem;color:#aaa;" >Category</div>
 </td>
 <td class="text-center">
 <span class="badge rounded-pill" style="background:#f0ebe3;color:#555;font-size:0.85rem;padding:0.35rem 0.75rem;" >1</span>
 </td>
 <td class="text-end" >$0</td>
 <td class="text-end fw-600" >$0</td>
 </tr>
 </tbody>
 <tfoot>
 <tr>
 <td colspan="3" class="text-end">Grand Total</td>
 <td class="text-end total-amount" >$0.00</td>
 </tr>
 </tfoot>
 </table>
 </div>

 <!-- Actions -->
 <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
 <form
 action="#" method="post">
 <button type="submit" class="btn btn-outline-danger rounded-3"
 onclick="return confirm('Are you sure you want to cancel?')">
 <i class="bi bi-x-circle me-1"></i>Cancel Order
 </button>
 </form>
 <div class="d-flex gap-2 ms-auto">
 <a href="#" class="btn btn-outline-secondary rounded-3">
 <i class="bi bi-arrow-left me-1"></i>Back
 </a>
 <a href="#" class="btn btn-gold rounded-3">
 <i class="bi bi-plus-circle me-1"></i>New Order
 </a>
 </div>
 </div>
 </div>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account – Saveur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            color: #e8b86d;
            font-size: 2rem;
            text-decoration: none;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            background: #1a1a1a;
        }

        .card-body {
            padding: 2.5rem;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 1.8rem;
        }

        .card-subtitle {
            color: #888;
        }

        .form-label {
            color: #ccc;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-control {
            background: #2a2a2a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            padding: 0.7rem 1rem;
        }

        .form-control:focus {
            background: #2a2a2a;
            border-color: #e8b86d;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(232, 184, 109, 0.15);
        }

        .form-control::placeholder {
            color: #555;
        }

        .input-group-text {
            background: #2a2a2a;
            border: 1px solid #333;
            color: #888;
            border-radius: 10px 0 0 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e8b86d, #c9942e);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            color: #000;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #f0c97e, #d9a43e);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(232, 184, 109, 0.3);
            color: #000;
        }

        .divider {
            border-color: #333;
        }

        .footer-link {
            color: #888;
            font-size: 0.9rem;
        }

        .footer-link a {
            color: #e8b86d;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover {
            color: #f0c97e;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
            border-radius: 10px;
        }

        .feature-badge {
            background: rgba(232, 184, 109, 0.1);
            border: 1px solid rgba(232, 184, 109, 0.2);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            color: #e8b86d;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="text-center mb-4">
            <a href="/menu" class="brand-title">🍽 Saveur</a>
            <p class="text-muted mt-1" style="font-size:0.85rem;">Fine Dining Experience</p>
        </div>

        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-1">Create Account</h2>
                <p class="card-subtitle mb-4">Join us for an exceptional dining experience</p>

                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span th:text="${param.error} ?: 'Registration failed'">Error</span>
                </div>

                <form th:object="${registerDTO}" th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="John Doe"
                                required style="border-radius:0 10px 10px 0;" />
                        </div>
                        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small mt-1"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com"
                                required style="border-radius:0 10px 10px 0;" />
                        </div>
                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small mt-1"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" th:field="*{password}" id="password" class="form-control"
                                placeholder="Minimum 6 characters" required minlength="6"
                                style="border-right:none; border-radius:0;" />
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border: 1px solid #333; border-left: none; background: #2a2a2a; color: #888; border-radius: 0 10px 10px 0;" aria-label="Toggle password visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small mt-1"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i>Create My Account
                    </button>
                </form>

                <hr class="divider" />
                <p class="footer-link text-center mb-0">
                    Already have an account? <a th:href="@{/login}">Sign In</a>
                </p>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-2 mt-3 flex-wrap">
            <span class="feature-badge"><i class="bi bi-shield-check me-1"></i>Secure</span>
            <span class="feature-badge"><i class="bi bi-star me-1"></i>Premium Menu</span>
            <span class="feature-badge"><i class="bi bi-clock me-1"></i>Fast Delivery</span>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.querySelector('i').classList.toggle('bi-eye');
            this.querySelector('i').classList.toggle('bi-eye-slash');
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Admin Dashboard – Saveur</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 <style>
 body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; }
 .sidebar { width: 250px; min-height: 100vh; background: #1a1a1a; position: fixed; top: 0; left: 0; z-index: 100; padding-top: 0; }
 .sidebar-brand { font-family: 'Playfair Display', serif; color: #e8b86d; font-size: 1.4rem; padding: 1.5rem; border-bottom: 1px solid #2d2d2d; display: block; text-decoration: none; }
 .sidebar-brand span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 0.2rem; }
 .sidebar-nav { padding: 1rem 0; }
 .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
 .sidebar-link:hover, .sidebar-link.active { color: #e8b86d; background: rgba(232,184,109,0.08); border-left-color: #e8b86d; }
 .sidebar-link i { font-size: 1.1rem; width: 20px; }
 .sidebar-section { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #444; padding: 1rem 1.5rem 0.4rem; }
 .main-content { margin-left: 250px; padding: 2rem; min-height: 100vh; }
 .topbar { background: white; border-radius: 16px; padding: 1.25rem 1.75rem; margin-bottom: 1.5rem; box-shadow: 0 1px 10px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
 .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #1a1a1a; margin: 0; }
 .btn-gold { background: linear-gradient(135deg, #e8b86d, #c9942e); color: #000; border: none; border-radius: 8px; font-weight: 600; padding: 0.5rem 1.2rem; }
 .btn-gold:hover { background: linear-gradient(135deg, #f0c97e, #d9a43e); color: #000; }
 .stat-card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 1px 10px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); height: 100%; }
 .stat-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 1rem; }
 .stat-value { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: #1a1a1a; line-height: 1; }
 .stat-label { color: #999; font-size: 0.85rem; margin-top: 0.25rem; }
 .card { border: none; border-radius: 16px; box-shadow: 0 1px 10px rgba(0,0,0,0.06); }
 .card-header { background: white; border-bottom: 1px solid #f5f0e8; padding: 1.25rem 1.5rem; font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #1a1a1a; border-radius: 16px 16px 0 0 !important; }
 .table { margin: 0; }
 .table thead th { background: #fdfaf6; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; font-weight: 700; border-bottom: 1px solid #f0ebe3; padding: 0.8rem 1rem; }
 .table tbody td { padding: 0.85rem 1rem; vertical-align: middle; font-size: 0.88rem; border-color: #f8f3eb; }
 .status-pending { background: #fff3cd; color: #856404; }
 .status-confirmed { background: #cff4fc; color: #055160; }
 .status-preparing { background: #e2d9f3; color: #5b21b6; }
 .status-ready { background: #d1fae5; color: #065f46; }
 .status-delivered { background: #e9ecef; color: #495057; }
 .status-cancelled { background: #fde8e8; color: #b91c1c; }
 .status-badge { border-radius: 20px; padding: 0.25rem 0.7rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
 .btn-logout { background: transparent; border: 1px solid #333; color: #888; border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.85rem; transition: all 0.2s; }
 .btn-logout:hover { border-color: #e8b86d; color: #e8b86d; }
 </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
 <a href="/admin" class="sidebar-brand">🍽 Saveur<span>Admin Panel</span></a>
 <div class="sidebar-nav">
 <div class="sidebar-section">Main</div>
 <a href="/admin" class="sidebar-link active"><i class="bi bi-speedometer2"></i>Dashboard</a>
 <a href="/admin/orders" class="sidebar-link"><i class="bi bi-receipt"></i>Orders</a>
 <div class="sidebar-section">Manage</div>
 <a href="/admin/menu" class="sidebar-link"><i class="bi bi-grid"></i>Menu Items</a>
 <div class="sidebar-section">Site</div>
 <a href="/menu" class="sidebar-link"><i class="bi bi-eye"></i>View Website</a>
 <a href="/orders/my" class="sidebar-link"><i class="bi bi-person"></i>My Orders</a>
 </div>
</div>

<!-- Main Content -->
<div class="main-content">
 <!-- Topbar -->
 <div class="topbar">
 <h1 class="topbar-title"><i class="bi bi-speedometer2 me-2" style="color:#e8b86d;"></i>Dashboard</h1>
 <div class="d-flex align-items-center gap-3">
 <span style="font-size:0.85rem;color:#888;"><i class="bi bi-circle-fill me-1" style="color:#28a745;font-size:0.6rem;"></i>System Online</span>
 <form th:action="@{/logout}" method="post">
 <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
 </form>
 </div>
 </div>

 <div th:if="${success}" class="alert alert-success border-0 rounded-3 mb-3" th:text="${success}"></div>

 <!-- Stats -->
 <div class="row g-3 mb-4">
 <div class="col-sm-6 col-xl-3">
 <div class="stat-card">
 <div class="stat-icon" style="background:rgba(232,184,109,0.12);color:#c9942e;"><i class="bi bi-receipt"></i></div>
 <div class="stat-value" th:text="${totalOrders}">0</div>
 <div class="stat-label">Total Orders</div>
 </div>
 </div>
 <div class="col-sm-6 col-xl-3">
 <div class="stat-card">
 <div class="stat-icon" style="background:rgba(13,202,240,0.12);color:#0dcaf0;"><i class="bi bi-grid"></i></div>
 <div class="stat-value" th:text="${totalItems}">0</div>
 <div class="stat-label">Menu Items</div>
 </div>
 </div>
 </div>

 <!-- Recent Orders Table -->
 <div class="card">
 <div class="card-header d-flex justify-content-between align-items-center">
 <span><i class="bi bi-clock-history me-2" style="color:#e8b86d;"></i>Recent Orders</span>
 <a href="/admin/orders" class="btn btn-gold btn-sm">View All</a>
 </div>
 <div class="table-responsive">
 <table class="table">
 <thead>
 <tr>
 <th>Order #</th>
 <th>Customer</th>
 <th>Total</th>
 <th>Status</th>
 <th>Date</th>
 </tr>
 </thead>
 <tbody>
 <tr th:each="order : ${recentOrders}">
 <td><strong th:text="'#' + ${order.id}"></strong></td>
 <td>
 <div th:text="${order.user.username}"></div>
 <div style="font-size:0.75rem;color:#aaa;" th:text="${order.user.email}"></div>
 </td>
 <td><strong style="color:#c9942e;" th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}"></strong></td>
 <td><span th:class="'status-badge status-' + ${order.status.name().toLowerCase()}" th:text="${order.status}"></span></td>
 <td style="color:#999;" th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}"></td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
